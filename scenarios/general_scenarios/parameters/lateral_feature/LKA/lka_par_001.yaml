parameters:
  # ==== SPAWN EV,TV ====
  ev_lane_id: [-2]
  tv_lane_id: [-2]

  # ===== SPEED =====
  ev_speed: [15] # unit: m/s
  tv_speed: [15] # unit: m/s

  # ===== LANE DEPARTURE =====
  trigger_lane_departure_time_1: [5] # unit: s
  trigger_lane_departure_time_2: [12] # unit: s
  trigger_lane_departure_time_3: [19] # unit: s
  lane_departure_offset: [0.75] # unit: m, sign alternates in the maneuver block
  lane_departure_max_lateral_acc: [0.42] # unit: m/s2
  scenario_duration: [34] # unit: s

  # ===== LKA CONTROLLER TUNING =====
  activation_offset: [0.20]
  deadband_offset: [0.04]
  kp_offset: [0.11]
  kp_heading: [0.38]
  kp_speed: [0.22]
  max_steer: [0.20]
  max_throttle: [0.42]
  max_brake: [0.18]
  offset_command_steer: [0.075]
  lane_departure_disturbance_duration: [1.4]
  fixed_delta_seconds: [0.05]

  # ===== ENVIRONMENT =====
  light: [day]
  weather: [clear]
