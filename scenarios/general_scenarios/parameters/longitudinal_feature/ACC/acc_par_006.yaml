parameters:
  # ==== SPAWN EV,TVs =====
  ev_lane_id: [-1]       # Lane của EV
  tv1_lane_id: [-1]       # Lane của TV1
  tv2_lane_id: [-2]        # Lane của TV2

  # ===== SPEED SET ===== 
  ev_speed: [5, 10]  # Tốc độ của EV
  tv1_speed: [4, 9] # Tốc độ của TV1
  tv2_speed: [4, 9]  # Tốc độ của TV2

# ==== Timestamp====
  trigger_cutin_time: [3, 5]
  maintain_duration: [12]

# ==== TARGET LANE CHANGE ====
  lane_change_distance: [3, 6]  
  lane_change_direction: [1]  #TV cutin từ bên trái EV

# ==== environment ====
  light: [day, night]
  weather: [clear, rain, fog]

constraints:
  - ev_speed > tv1_speed
  - tv2_speed < tv1_speed