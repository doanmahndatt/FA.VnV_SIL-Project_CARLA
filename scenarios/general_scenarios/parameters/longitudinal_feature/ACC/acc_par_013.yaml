parameters:
  # ==== SPAWN EV,TVs =====
  ev_lane_id: [-1]       # Lane của EV
  tv1_lane_id: [-1]       # Lane của TV1
  tv2_lane_id: [-1]        # Lane của TV2

  # ===== SPEED SET ===== 
  ev_speed: [5, 7]  # Tốc độ của EV
  tv1_speed: [3, 5] # Tốc độ của TV1
  tv2_speed: [0]  # Tốc độ của TV2

# ==== Timestamp====
  trigger_cutout_time: [2, 4]
  maintain_duration: [10]

# ==== TARGET LANE CHANGE ====
  lane_change_distance: [2, 3]  
  lane_change_direction: [-1]  #TV cutout sang bên trái EV

# ==== environment ====
  light: [day, night]
  weather: [clear, rain, fog]

constraints:
  - ev_speed > tv1_speed