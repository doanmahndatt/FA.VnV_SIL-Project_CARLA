scenario_id: acc_csc_003
name: EV in CC mode, TV cut in from left
functional: ACC
feature_domain: Longitudinal  #Longitudinal -> longitudinal_feature
                              #Lateral      -> lateral_feature
                              #Parking      -> parking_feature
                              #Brake        -> brake_feature

pre_condition:
  ev_mode: CC

actors:
  - ev:
      type: ego
      lane: ego
      state: moving
  - tv:
      type: truck
      lane: left
      position: next_to_ego
      state: moving

maneuvers:
  - type: cutin_event
    actor: tv
    direction: left_to_ego