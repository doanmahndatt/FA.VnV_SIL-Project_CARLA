scenario_id: aeb_csc_001_001
logic:
  scenario_id: aeb_csc_001
  name: EV approaches a suddenly braking TV in ego lane
  functional: AEB
  feature_domain: Brake
  pre_condition:
    ev_mode: AEB
  actors:
  - ev:
      type: ego
      lane: ego
      state: moving
  - tv:
      type: car
      lane: ego
      position: front_ego
      state: moving
  maneuvers:
