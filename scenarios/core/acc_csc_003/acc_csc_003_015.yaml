scenario_id: acc_csc_003_015
logic:
  scenario_id: acc_csc_003
  name: EV in CC mode, TV cut in from left
  pre_condition:
    ev_mode: CC
  actors:
  - ev:
      type: ego
      lane: ego
      state: moving
  - tv:
      type: truck
      lane: left
      position: next_to_ego
      state: moving
  maneuvers:
  - type: cutin_event
    actor: tv
    direction: left_to_ego
parameters:
  ev_lane_id: -2
  tv_lane_id: -1
  ev_speed: 20
  tv_speed: 5
  tv_maintain_speed: 15
  response_cutin_time: 3
  trigger_cutin_time: 5
  lane_change_direction: 1
  light: day
  weather: fog
