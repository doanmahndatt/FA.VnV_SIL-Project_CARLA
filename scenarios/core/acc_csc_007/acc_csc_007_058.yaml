scenario_id: acc_csc_007_058
logic:
  scenario_id: acc_csc_007
  name: EV in FL mode, TV cut in then stop
  pre_condition:
    ev_mode: FL
  actors:
  - ev:
      type: ego
      lane: ego
      state: moving
  - tv:
      type: bus
      lane: left
      position: next_to_ego
      state: moving
  maneuvers:
  - type: cutin_event
    actor: tv
  - type: stop_event
    actor: tv
    trigger: after_cutin_event
parameters:
  ev_lane_id: -2
  tv_lane_id: -1
  tv_speed: 15
  trigger_cutin_time: 3
  maintain_duration: 5
  trigger_deceleration_time: 1
  trigger_stop_time: 10
  maintain_stop_duration: 5
  lane_change_distance: 10
  lane_change_direction: -1
  light: night
  weather: clear
