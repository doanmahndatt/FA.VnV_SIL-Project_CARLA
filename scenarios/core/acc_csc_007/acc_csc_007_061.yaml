scenario_id: acc_csc_007_061
logic:
  scenario_id: acc_csc_007
  name: EV in FL mode, TV cut in then stop
  functional: ACC
  feature_domain: Longitudinal
  pre_condition:
    ev_mode: FL
  actors:
  - ev:
      type: ego
      lane: ego
      state: moving
  - tv:
      type: bus
      lane: left
      position: next_to_ego
      state: moving
  maneuvers:
  - type: cutin_event
    actor: tv
  - type: stop_event
    actor: tv
    trigger: after_cutin_event
parameters:
  ev_lane_id: -2
  tv_lane_id: -1
  actor: tv
  ev_speed: 10
  tv_speed: 15
  trigger_cutin_time: 5
  maintain_duration: 5
  trigger_deceleration_time: 1
  stop_after_cutin_delay: 0.5
  lane_change_distance: 5
  lane_change_direction: -1
  light: day
  weather: clear
