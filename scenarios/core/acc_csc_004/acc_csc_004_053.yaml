scenario_id: acc_csc_004_053
logic:
  scenario_id: acc_csc_004
  name: EV in CC mode, TV cut in from right
  pre_condition:
    ev_mode: CC
  actors:
  - ev:
      type: ego
      lane: ego
      state: moving
  - tv:
      type: truck
      lane: right
      position: next_to_ego
      state: moving
  maneuvers:
  - type: cutin_event
    actor: tv
    direction: right_to_ego
parameters:
  ev_lane_id: -1
  tv_lane_id: -2
  tv_speed: 15
  trigger_cutin_time: 3
  maintain_duration: 12
  lane_change_distance: 5
  lane_change_direction: 1
  light: night
  weather: rain
