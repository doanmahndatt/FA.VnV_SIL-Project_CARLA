parameters:
  # ==== SPAWN EV,TV =====
  ev_lane_id: [-1]       # Lane của EV
  tv_lane_id: [-2]       # Lane của TV

  # ===== SPEED =====
  ev_speed: [10, 15, 20]
  tv_speed: [5, 10, 15]

# ==== Timestamp====
  trigger_cutout_time: [6, 9]
  maintain_duration: [10]

# ==== TARGET LANE CHANGE ====
  lane_change_distance: [3, 5]  
  lane_change_direction: [-1]  #EV cutout sang bên phải

# ==== environment ====
  light: [day, night]
  weather: [clear, rain, fog]

constraints:
  - ev_speed > tv_speed