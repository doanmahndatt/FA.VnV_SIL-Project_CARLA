parameters:
  # ==== SPAWN EV,TV =====
  ev_lane_id: [-1]       # Lane của EV
  tv_lane_id: [-2]       # Lane của TV

  # ===== SPEED =====
  ev_speed: [10, 15, 20]
  tv_speed: [5, 10, 15]

# ==== Timestamp====
  trigger_cutin_time: [3, 5]
  maintain_duration: [20]

# ==== TARGET LANE CHANGE ====
  lane_change_distance: [5, 10]  
  lane_change_direction: [1]  #TV cutin từ bên trái EV

# ==== environment ====
  light: [day, night]
  weather: [clear, rain, fog]

constraints:
  - ev_speed > tv_speed