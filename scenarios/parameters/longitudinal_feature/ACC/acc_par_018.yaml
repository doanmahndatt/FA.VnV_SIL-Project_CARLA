parameters:
  # ==== SPAWN EV,TV =====
  ev_lane_id: [-2]       # Lane của EV
  tv_lane_id: [-1]       # Lane của TV

  # ===== SPEED =====
  ev_speed: [5, 10]
  tv_speed: [0]

# ==== Timestamp====
  trigger_cutout_time: [1, 3]
  maintain_duration: [10]

# ==== TARGET LANE CHANGE ====
  lane_change_distance: [2, 4]  
  lane_change_direction: [1]  #EV cutout sang bên trái

# ==== environment ====
  light: [day, night]
  weather: [clear, rain, fog]