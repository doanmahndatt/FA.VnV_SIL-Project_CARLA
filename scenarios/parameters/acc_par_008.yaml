parameters:
  # ==== SPAWN EV,TV =====
  ev_lane_id: [-2]       # Lane của EV
  tv_lane_id: [-2]       # Lane của TV

  # ===== SPEED =====
  ev_speed: [15, 20, 25]
  tv_speed: [5, 10, 15]

# ==== Timestamp====
  trigger_cutout_time: [3, 5]
  maintain_duration: [20]

# ==== TARGET LANE CHANGE ====
  lane_change_distance: [5, 10]  
  lane_change_direction: [1]  #TV cutout sang bên trái

# ==== environment ====
  light: [day, night]
  weather: [clear, rain, fog]

constraints:
  - ev_speed > tv_speed