parameters:
  # ==== SPAWN EV,TV =====
  ev_lane_id: [-1]       # Lane của EV
  tv_lane_id: [-2]       # Lane của TV

  # ===== SPEED =====
  tv_speed: [5, 10, 15]

  # ==== Timestamp====
  trigger_cutin_time: [3, 5]
  maintain_duration: [12]

  # ==== TARGET LANE CHANGE ====
  lane_change_distance: [5, 10]  
  lane_change_direction: [1]  #TV cutin từ bên phải EV

  # ==== environment ====
  light: [day, night]
  weather: [clear, rain, fog]