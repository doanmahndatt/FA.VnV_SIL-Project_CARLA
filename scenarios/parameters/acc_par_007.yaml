parameters:
  # ==== SPAWN EV,TV =====
  ev_lane_id: [-2]       # Lane của EV
  tv_lane_id: [-1]       # Lane của TV

  # ===== SPEED =====
  ev_speed: [10, 20]
  tv_speed: [5, 10]
  tv_maintain_speed: [7, 15]

# ==== Timestamp====
  response_cutin_time: [1]
  deceleration_time: [2]
  trigger_cutin_time: [5]
  trigger_stop_time: [6]

# ==== TARGET LANE CHANGE ====
  lane_change_direction: [1]  #TV cuutin từ bên trái EV

# ==== environment ====
  light: [day, night]
  weather: [clear, rain, fog]

constraints:
  - ev_speed > tv_maintain_speed
  - tv_maintain_speed > tv_speed