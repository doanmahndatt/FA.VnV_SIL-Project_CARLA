parameters:
  # ==== SPAWN EV,TV =====
  ev_lane_id: [-2]       # Lane của EV
  tv_lane_id: [-1]       # Lane của TV

  # ===== SPEED =====
  tv_speed: [5, 10, 15]

  # ==== Timestamp====
  trigger_cutin_time: [3, 5]
  maintain_duration: [5]
  trigger_deceleration_time: [1]
  trigger_stop_time: [10]
  maintain_stop_duration: [5]


  # ==== TARGET LANE CHANGE ====
  lane_change_distance: [5, 10]  
  lane_change_direction: [-1]  #TV cutin từ bên trái EV

  # ==== environment ====
  light: [day, night]
  weather: [clear, rain, fog]